<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Транспорт — Т-Банк</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1C1C1E;
    color: #fff;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  .phone-container {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: #1C1C1E;
    position: relative;
  }

  .sheet-handle {
    display: flex;
    justify-content: center;
    padding: 8px 0 4px;
    flex-shrink: 0;
  }
  .sheet-handle span {
    width: 36px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.18);
  }

  .sticky-header {
    position: relative;
    flex-shrink: 0;
    padding: 4px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    background: #1C1C1E;
  }

  .close-btn {
    position: absolute;
    right: 16px;
    top: 4px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #2C2C2E;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #A9C4FF;
  }
  .close-btn svg { width: 14px; height: 14px; }

  .header-date {
    font-size: 13px;
    color: #9B9BA1;
    font-weight: 500;
    text-align: center;
    transition: opacity 0.25s ease;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  .compact-title {
    text-align: center;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .compact-title .ct-name { font-size: 16px; font-weight: 700; }
  .compact-title .ct-amount { font-size: 13px; color: #9B9BA1; margin-top: 1px; }

  .sticky-header.scrolled .header-date { opacity: 0; }
  .sticky-header.scrolled .compact-title { opacity: 1; }

  .scroll-area {
    padding-bottom: 40px;
    background: #1C1C1E;
  }

  /* ===== Photo blocks (user-cropped real screenshots, placed symmetrically) ===== */
  .photo-block {
    width: 100%;
    display: block;
    margin: 0 0 8px;
  }
  .photo-block img {
    display: block;
    width: 396px;
    max-width: 92.16%;
    height: auto;
    margin: 0 auto;
  }

  .hero-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 0;
  }

  .hero-photo {
    width: 293px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .hero-amount {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin: 4px 0 8px;
    cursor: pointer;
    outline: none;
    text-align: center;
  }
  .hero-amount:focus {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 2px 8px;
    margin: 2px -8px 6px;
  }

  .not-count-photo {
    width: 118px;
    height: auto;
    display: block;
    margin: 0 auto 4px;
    cursor: pointer;
    border-radius: 14px;
    transition: transform 0.1s, filter 0.2s;
  }
  .not-count-photo:active { transform: scale(0.96); }
  .not-count-photo.active { filter: brightness(1.6) saturate(0.5); }

  /* Requisites (text, editable) styled to match real card color exactly */
  .req-card {
    background: #2C2C2E;
    border-radius: 20px;
    margin: 0 20px 8px;
    padding: 18px;
  }
  .card-row-title {
    font-size: 16px;
    font-weight: 700;
  }
  .req-label {
    font-size: 13px;
    color: #8E8E93;
    margin: 12px 0 6px;
  }
  .req-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
    cursor: text;
    outline: none;
    border-radius: 6px;
    padding: 2px 0;
    display: inline-block;
    min-width: 100%;
  }
  .req-text:focus {
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    margin: 0 -6px;
  }

  /* Stars photo overlay */
  .stars-photo-wrap {
    position: relative;
    width: 396px;
    max-width: 92.16%;
    margin: 0 auto;
  }
  .stars-photo-wrap img {
    width: 100%;
    max-width: 100%;
    display: block;
  }
  .stars-click-row {
    position: absolute;
    left: 18%;
    right: 18%;
    top: 60%;
    bottom: 12%;
    display: flex;
  }
  .stars-click-row .star-zone {
    flex: 1;
    cursor: pointer;
  }

  #toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    color: #000;
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
    pointer-events: none;
    white-space: nowrap;
    font-family: Inter, sans-serif;
  }
</style>
</head>

<div id="toast"></div>

<script>
  const scrollArea = document.getElementById('scrollArea');
  const stickyHeader = document.getElementById('stickyHeader');

  scrollArea.addEventListener('scroll', () => {
    if (scrollArea.scrollTop > 120) {
      stickyHeader.classList.add('scrolled');
    } else {
      stickyHeader.classList.remove('scrolled');
    }
  });

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.style.opacity = '0', 1800);
  }

  let editHintTimer;
  function showEditHint() {
    clearTimeout(editHintTimer);
    editHintTimer = setTimeout(() => showToast('Изменено ✓'), 600);
  }

  function updateCompactAmount(el) {
    const compact = document.getElementById('compactAmount');
    let text = el.textContent.trim();
    if (text) compact.textContent = text;
  }

  function handleAmountKeydown(e, el) {
    if (e.key === 'Enter') {
      e.preventDefault();
      el.blur();
      showToast('Сумма изменена ✓');
    }
  }

  function toggleNotCount(img) {
    img.classList.toggle('active');
    if (img.classList.contains('active')) {
      showToast('Не учитывается в статистике');
    } else {
      showToast('Учитывается в статистике');
    }
  }

  let currentRating = 0;
  function rate(v) {
    currentRating = v;
    showToast('Оценка: ' + v + ' из 5');
  }
</script>
